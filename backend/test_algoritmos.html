<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test de algoritmos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      padding: 10px 16px;
      margin-right: 8px;
      cursor: pointer;
    }
    .result {
      margin-top: 16px;
      white-space: pre-wrap;
      background: #111827;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 6px;
      overflow: auto;
    }
    img {
      max-width: 100%;
      border: 1px solid #ddd;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Prueba de compresión</h2>
    <textarea id="texto" placeholder="Escribí un párrafo para probar Huffman, Shannon-Fano o Hamming">Hola mundo</textarea>

    <div>
      <button onclick="llamarAPI('huffman')">Huffman</button>
      <button onclick="llamarAPI('shannon-fano')">Shannon-Fano</button>
      <button onclick="llamarAPI('hamming')">Hamming</button>
    </div>

    <div id="resultado" class="result"></div>
    <div id="imagenContainer"></div>
  </div>

  <script>
    const apiBase = 'http://127.0.0.1:5000/api/algoritmos';

    async function llamarAPI(algoritmo) {
      const texto = document.getElementById('texto').value;
      const resultado = document.getElementById('resultado');
      const imagenContainer = document.getElementById('imagenContainer');

      resultado.textContent = 'Cargando...';
      imagenContainer.innerHTML = '';

      try {
        const response = await fetch(`${apiBase}/${algoritmo}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ texto })
        });

        const data = await response.json();

        resultado.textContent = JSON.stringify(data, null, 2);

        if (data.ruta_imagen) {
          const img = document.createElement('img');
          img.src = `http://127.0.0.1:5000${data.ruta_imagen}`;
          img.alt = `${algoritmo} tree`;
          imagenContainer.appendChild(img);
        }
      } catch (error) {
        resultado.textContent = 'Error: ' + error.message;
      }
    }
  </script>
</body>
</html>
